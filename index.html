<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<title>釜山行 · 7/28–8/5 行程規劃</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/colors_and_type.css">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #e8eef3;
    font-family: "Noto Sans TC", -apple-system, system-ui;
  }
  body {
    min-height: 100vh; min-height: 100dvh;
    display: flex; justify-content: center;
  }
  .phone-wrap {
    position: relative;
    width: 100%;
    max-width: 460px;
    background: #f7fafc;
    display: flex;
    flex-direction: column;
    min-height: 100vh; min-height: 100dvh;
  }
  .scroll {
    flex: 1;
    background: #f7fafc;
  }
  .tabbar {
    position: sticky;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    box-shadow: 0 -2px 24px rgba(38,50,56,0.10);
    border-top: 1px solid #eef1f4;
    display: flex;
    padding: 6px 4px max(8px, env(safe-area-inset-bottom));
    z-index: 5;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 6px 0; color: #9c9da0; font-size: 10px; font-weight: 500; cursor: pointer;
  }
  .tab.on { color: #1ab6c1; }

  /* Desktop: centered phone-card feel */
  @media (min-width: 720px) {
    body { padding: 24px 0; align-items: flex-start; }
    .phone-wrap {
      min-height: calc(100vh - 48px);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(38,50,56,0.18), 0 0 0 1px rgba(38,50,56,0.06);
    }
  }
</style>
</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/data.js"></script>
<script type="text/babel" src="src/ios-frame.jsx"></script>
<script type="text/babel" src="src/primitives.jsx"></script>
<script type="text/babel" src="src/screen-overview.jsx"></script>
<script type="text/babel" src="src/screen-entry.jsx"></script>
<script type="text/babel" src="src/screen-itinerary.jsx"></script>
<script type="text/babel" src="src/screen-tips.jsx"></script>

<script type="text/babel">
function BusanTabBar({ active, onTab }) {
  const items = [
    { k: 'overview', l: '總覽', on: 'ic_home_fill', off: 'ic_home_line' },
    { k: 'entry', l: '入境', on: 'ic_check_circle_fill', off: 'ic_check_circle_line' },
    { k: 'itinerary', l: '行程', on: 'ic_calendar_fill', off: 'ic_calendar_line' },
    { k: 'tips', l: '攻略', on: 'ic_info_fill', off: 'ic_info_line' },
  ];
  return (
    <div className="tabbar">
      {items.map(t => {
        const isOn = active === t.k;
        return (
          <div key={t.k} className={'tab' + (isOn ? ' on' : '')} onClick={() => onTab(t.k)} data-screen-label={t.l}>
            <Icon name={isOn ? t.on : t.off} size={22} color={isOn ? 'teal' : 'ink3'} />
            <span>{t.l}</span>
          </div>
        );
      })}
    </div>
  );
}

// ============== URL hash router ===============
// #overview | #entry | #itinerary | #tips | #day/3
// Any navigation goes through location.hash so the browser back button
// (and mobile swipe-back gesture) returns to the previous screen.
function parseHash() {
  const raw = (window.location.hash || '#overview').slice(1);
  const [screen, sub] = raw.split('/');
  const dayN = sub ? Math.max(1, Math.min(DAYS.length, parseInt(sub, 10) || 1)) : 1;
  const valid = ['overview', 'entry', 'itinerary', 'tips', 'day'];
  return {
    screen: valid.includes(screen) ? screen : 'overview',
    dayN,
  };
}

function hashFor(screen, dayN) {
  return screen === 'day' ? `#day/${dayN}` : `#${screen}`;
}

function App() {
  const SCREENS = [
    ['overview', '總覽'],
    ['entry', '入境準備'],
    ['itinerary', '逐日行程'],
    ['day', 'Day 詳細'],
    ['tips', '攻略'],
  ];

  const [{ screen, dayN }, setState] = React.useState(parseHash);

  // Listen for back/forward (browser back button, mobile swipe-back).
  React.useEffect(() => {
    const onHash = () => setState(parseHash());
    window.addEventListener('hashchange', onHash);
    // make sure initial hash is set so first back stays in-app
    if (!window.location.hash) {
      history.replaceState(null, '', '#overview');
    }
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // Navigate by pushing a new hash (creates a history entry).
  const go = (nextScreen, nextDay = dayN) => {
    const target = hashFor(nextScreen, nextDay);
    if (window.location.hash === target) return;
    window.location.hash = target;
  };

  // Back goes through browser history so users can chain back-back-back.
  const back = () => {
    if (window.history.length > 1) {
      window.history.back();
    } else {
      go('overview');
    }
  };

  const setScreen = go;
  const setDayN = (n) => go('day', n);

  // (top toolbar removed — navigation lives in the bottom tab bar)

  let content;
  let tab = screen;
  let showTabBar = true;
  if (screen === 'overview') {
    content = <OverviewScreen
      onOpenDay={(n) => { setDayN(n); }}
      onOpenEntry={() => setScreen('entry')}
      onOpenItinerary={() => setScreen('itinerary')}
      onOpenTips={() => setScreen('tips')}
    />;
  } else if (screen === 'entry') {
    content = <EntryScreen onBack={back} />;
  } else if (screen === 'itinerary') {
    content = <ItineraryScreen
      onBack={back}
      onOpenDay={(n) => { setDayN(n); }}
    />;
  } else if (screen === 'day') {
    content = <DayDetailScreen
      dayN={dayN}
      onBack={back}
      onPrev={() => setDayN(Math.max(1, dayN - 1))}
      onNext={() => setDayN(Math.min(DAYS.length, dayN + 1))}
    />;
    tab = 'itinerary';
    showTabBar = false; // immersive day view
  } else if (screen === 'tips') {
    content = <TipsScreen onBack={back} />;
  }

  return (
    <div className="phone-wrap">
      <div className="scroll" data-screen-label={screen}>
        {content}
      </div>
      {showTabBar && <BusanTabBar active={tab} onTab={(t) => setScreen(t)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
</script>

</body>
</html>
